name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
      - run: go run ./cmd/xapi-validate -vectors vectors -check-sources=false

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            binary: xapi-conformance
          - target: darwin-x64
            goos: darwin
            goarch: amd64
            binary: xapi-conformance
          - target: linux-arm64
            goos: linux
            goarch: arm64
            binary: xapi-conformance
          - target: linux-x64
            goos: linux
            goarch: amd64
            binary: xapi-conformance
          - target: win32-arm64
            goos: windows
            goarch: arm64
            binary: xapi-conformance.exe
          - target: win32-x64
            goos: windows
            goarch: amd64
            binary: xapi-conformance.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build ${{ matrix.target }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags='-s -w' -o 'dist/${{ matrix.target }}/${{ matrix.binary }}' ./cmd/xapi-runner
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Prepare uniquely named release assets
        run: |
          mkdir -p release
          cp dist/darwin-arm64/xapi-conformance release/xapi-conformance-darwin-arm64
          cp dist/darwin-x64/xapi-conformance release/xapi-conformance-darwin-x64
          cp dist/linux-arm64/xapi-conformance release/xapi-conformance-linux-arm64
          cp dist/linux-x64/xapi-conformance release/xapi-conformance-linux-x64
          cp dist/win32-arm64/xapi-conformance.exe release/xapi-conformance-win32-arm64.exe
          cp dist/win32-x64/xapi-conformance.exe release/xapi-conformance-win32-x64.exe
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --repo "$GITHUB_REPOSITORY" --generate-notes

  npm-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.5.1
      - uses: actions/download-artifact@v4
        with:
          path: bin
      - name: Prepare packaged executables
        run: chmod +x bin/darwin-*/xapi-conformance bin/linux-*/xapi-conformance
      - run: npm test
      - name: Verify package contents
        run: npm pack --dry-run
      - name: Publish to npm with trusted publishing
        run: npm publish --access public --provenance
