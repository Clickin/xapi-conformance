name: conformance

on: [push, pull_request]

jobs:
  reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
      - run: go run ./cmd/xapi-validate -vectors vectors -check-sources=false
      - run: go run ./cmd/xapi-runner -command 'go run ./cmd/xapi-reference stdio' -json results.json -junit results.xml
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results
          path: |
            results.json
            results.xml
            server.log
